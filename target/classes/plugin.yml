name: SafeTransfer
description: $description
version: '1.0.0'

main: me.hippodev.safeTransfer.Core
# Paper's api-version only has major.minor granularity, but the actual floor
# is 1.20.6 (the earliest release with Player#transfer) - Core#onEnable
# checks for that method directly and disables itself with a clear message
# on anything older, since '1.20' alone can't express the patch requirement.
api-version: '1.20'
load: STARTUP
folia-supported: true

authors: [ HippoDev ]

commands:
  safetransfer:
    description: Transfer a player (or @a) to another server via the transfer packet, after confirming it is reachable.
    usage: /<command> <player|@a> <host[:port]> [delayTicks]
    aliases: [ st ]
    permission: safetransfer.use
  streload:
    description: Reload SafeTransfer's config.yml without restarting the server.
    usage: /<command>
    permission: safetransfer.reload

permissions:
  safetransfer.use:
    description: Allows use of /safetransfer
    default: op
  safetransfer.reload:
    description: Allows use of /streload
    default: op
